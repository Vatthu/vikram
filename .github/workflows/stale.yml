name: Stale Issues
on:
  schedule:
    - cron: '0 0 * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 7 days
            unless there is new activity. If this is still relevant, please comment
            to keep it open.
          stale-pr-message: >
            This pull request has been inactive for 30 days. It will be closed in
            7 days unless there is new activity.
          days-before-stale: 60
          days-before-close: 7
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'P0-critical,pinned'
          exempt-pr-labels: 'P0-critical,pinned'
