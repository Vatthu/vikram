name: ✨ Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Great features come from the community.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Go Host (cmd/vikram)
        - Python Orchestrator
        - Agent Loop (pkg/agent)
        - Tools System
        - Skills System
        - Channels (Telegram, WhatsApp, etc.)
        - REST API
        - CLI Experience
        - Configuration
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's missing today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you think about?

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to submit a PR for this feature
