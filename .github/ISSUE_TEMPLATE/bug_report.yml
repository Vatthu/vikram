name: 🐛 Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out the fields below so we can reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: Vikram Version
      description: "Output of `vikram version`"
      placeholder: "v0.1.0 (git: abc123)"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - CLI (vikram agent)
        - Gateway (vikram gateway)
        - Telegram Channel
        - WhatsApp Channel
        - REST API (/v1/*)
        - Python Orchestrator
        - Skills System
        - Configuration
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `vikram agent -m "..."`
        2. Observe error...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output (use `--debug` flag for verbose logs).
      render: shell

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.1 / Ubuntu 24.04 / Android 15 (Termux)"

  - type: input
    id: go-version
    attributes:
      label: Go Version
      placeholder: "go1.24.0"
