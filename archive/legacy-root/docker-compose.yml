services:
  # ─────────────────────────────────────────────
  # Vikram Agent (one-shot query)
  #   docker compose run --rm vikram-agent -m "Hello"
  # ─────────────────────────────────────────────
  vikram-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vikram-agent
    profiles:
      - agent
    volumes:
      - ./config/config.json:/home/vikram/.vikram/config.json:ro
      - vikram-workspace:/home/vikram/.vikram/workspace
    entrypoint: ["vikram", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # Vikram Gateway (Long-running Bot)
  #   docker compose up vikram-gateway
  # ─────────────────────────────────────────────
  vikram-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vikram-gateway
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      # Configuration file
      - ./config/config.json:/home/vikram/.vikram/config.json:ro
      # Persistent workspace (sessions, memory, logs)
      - vikram-workspace:/home/vikram/.vikram/workspace
    command: ["gateway"]

volumes:
  vikram-workspace:
