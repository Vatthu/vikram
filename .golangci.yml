# golangci-lint v2 configuration for Vikram
# https://golangci-lint.run/docs/configuration/file/
#
# Phased linter enablement. We start with a minimal clean baseline
# and expand as tech debt is addressed.
#
# Phase 1 (current): govet, ineffassign, misspell, gosec
# Phase 2: unconvert, unused, bodyclose, errorlint (fix ~25 findings)
# Phase 3: gocritic, gosimple, staticcheck, prealloc, unparam, noctx
# Phase 4: errcheck (~30 unchecked error returns)

version: "2"

linters:
  default: none
  enable:
    # --- Phase 1: Currently clean ---
    - govet
    - ineffassign
    - misspell
    - gosec

  settings:
    gosec:
      excludes:
        # ── Pre-existing exclusions (from v1 baseline) ──
        - G104  # Unhandled errors — covered by errcheck when re-enabled
        - G110  # Decompression bomb — skills installer handles trusted archives
        - G112  # Slowloris — local-only servers (oauth callback, smoke test)
        - G115  # Integer overflow int→uint — safe bounded conversions in queue
        - G204  # Subprocess with variable — shell tool executes commands by design
        - G304  # File inclusion via variable — expected in tool system
        - G306  # WriteFile permissions > 0600 — acceptable in tests
        # ── New rules added in gosec v2 (not present in v1) ──
        - G101  # Hardcoded credentials — false positive on test fixtures
        - G117  # Marshaled secret field pattern — test session keys
        - G118  # Goroutine with background ctx — intentional long-lived goroutines
        - G122  # TOCTOU in filepath.Walk — skills installer traversal is trusted
        - G301  # Directory permissions > 0750 — 0755 needed for cross-user access
        - G302  # File permissions > 0600 — acceptable in smoke test config
        - G702  # Command injection via taint — orchestrator runs git by design
        - G703  # Path traversal via taint — tools system reads user-specified paths
        - G704  # SSRF via taint — CLI client connects to user-configured server
        - G705  # XSS via taint — console is local-only, no untrusted browser

  exclusions:
    # Maintain v1 behavior for generated file detection
    generated: lax
    paths:
      - archive
      - vendor
      - ".*\\.cache.*"
      - ".*\\.venv.*"
      - web/node_modules
    rules: []

issues:
  max-issues-per-linter: 50
  max-same-issues: 3
