linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gocritic
    - gosec
    - misspell
    - prealloc
    - unconvert
    - unparam
    - errorlint
    - noctx

linters-settings:
  gosec:
    excludes:
      - G104  # Unhandled errors — too noisy initially
      - G304  # File inclusion via variable — expected in tool system
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
    disabled-checks:
      - hugeParam  # Too strict for message structs
  errcheck:
    check-type-assertions: true

issues:
  exclude-dirs:
    - archive
    - vendor
    - .cache
    - .venv
    - web/node_modules
  max-issues-per-linter: 50
  max-same-issues: 3

run:
  timeout: 5m
